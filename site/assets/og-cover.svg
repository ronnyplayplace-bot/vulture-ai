<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Vulture AI — Fully offline, private AI studio">
  <defs>
    <radialGradient id="glow" cx="50%" cy="118%" r="80%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="62%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b5dff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- eye mark -->
  <g transform="translate(600 232)">
    <circle r="86" fill="none" stroke="url(#stroke)" stroke-width="9" opacity="0.35" filter="url(#soft)"/>
    <circle r="86" fill="none" stroke="url(#stroke)" stroke-width="6"/>
    <circle r="28" fill="#9b5dff"/>
  </g>

  <!-- wordmark -->
  <text x="600" y="430" text-anchor="middle" font-family="'Bebas Neue', 'Arial Narrow', sans-serif" font-size="150" letter-spacing="6" fill="#f0f0f0">VULTURE AI</text>

  <!-- tagline -->
  <text x="600" y="486" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" font-size="26" letter-spacing="4" fill="#c084fc">IT SEES EVERYTHING — NOTHING LEAVES YOUR MACHINE</text>

  <!-- footnote -->
  <text x="600" y="556" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" font-size="19" letter-spacing="6" fill="#888888">100% OFFLINE · PRIVATE · FREE · OPEN SOURCE</text>
</svg>
